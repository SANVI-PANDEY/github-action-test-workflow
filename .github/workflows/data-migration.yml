name: Data Migration - UAT to Prod

on:
  workflow_dispatch:
    inputs:
      table_name:
        description: 'Table to migrate (users or products)'
        required: true
        type: choice
        options:
          - users
          - products
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Dry run (no actual changes)'
        required: false
        type: boolean
        default: true

jobs:
  migrate-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run data migration (TypeScript)
        env:
          UAT_DB_HOST: ${{ secrets.UAT_DB_HOST }}
          UAT_DB_USER: ${{ secrets.UAT_DB_USER }}
          UAT_DB_PASSWORD: ${{ secrets.UAT_DB_PASSWORD }}
          UAT_DB_NAME: ${{ secrets.UAT_DB_NAME }}
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
          TABLE_NAME: ${{ inputs.table_name }}
          TARGET_ENV: ${{ inputs.environment }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "🚀 Running TypeScript migration script..."
          npm run migrate:ts
      
      - name: Upload migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-log-${{ inputs.table_name }}-${{ github.run_number }}
          path: migration_log.txt
          retention-days: 30
